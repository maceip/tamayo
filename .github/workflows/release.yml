name: Release

# Cuts a GitHub release with prebuilt cmd/tamayo binaries when a version tag
# is pushed. Go users don't need these — `go install
# github.com/maceip/tamayo/cmd/tamayo@<tag>` builds from source — the
# attached archives are for machines without a Go toolchain. Everything is
# cross-compiled with the stock toolchain, CGO_ENABLED=0.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cross-compile cmd/tamayo
        run: |
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos="${t%/*}"; goarch="${t#*/}"
            bin=tamayo; [ "$goos" = windows ] && bin=tamayo.exe
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "-s -w" -o "dist/$bin" ./cmd/tamayo
            name="tamayo_${GITHUB_REF_NAME}_${goos}_${goarch}"
            if [ "$goos" = windows ]; then
              (cd dist && zip -q "${name}.zip" "$bin" && rm "$bin")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "$bin" && rm "dist/$bin"
            fi
          done
          (cd dist && sha256sum ./* > SHA256SUMS)
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
