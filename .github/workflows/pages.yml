name: Deploy Pages

# Publishes docs/ (the PoMFRIT delegation-story explainer) to GitHub
# Pages. The Pages source is set to "GitHub Actions", so this workflow is the
# only deploy path.
on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v5
